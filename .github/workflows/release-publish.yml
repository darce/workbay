name: release-publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Release-manifest package to build and publish
        required: true
        type: choice
        options:
          - workbay-protocol
          - mcp-workbay-handoff
          - mcp-workbay-orchestrator
          - workbay-bootstrap
          - workbay-codex-bridge
          - workbay-system
          - workbay-stack
          - workbay
      dry_run:
        description: Build and validate only; skip the Trusted Publishing upload job
        required: true
        type: boolean
        default: true
      expected_sha256_wheel:
        description: sha256 of the locally gate-validated wheel (from release.sh)
        required: false
        type: string
        default: ""
      expected_sha256_sdist:
        description: sha256 of the locally gate-validated sdist (from release.sh)
        required: false
        type: string
        default: ""
      source_date_epoch:
        description: SOURCE_DATE_EPOCH for the locally gate-validated build (from release.sh)
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  plan:
    name: Compute release plan
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.selected-package.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — the version-drift gate walks pyproject history via
          # `git log`/`<commit>^`; the default shallow (depth-1) clone would make
          # the gate silently pass regardless of real drift.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Validate release manifest
        run: python scripts/release_manifest.py validate

      - name: Release version-drift gate
        # Fail before publish if the SELECTED package's shipped payload changed
        # since its version was set (the 0019 silent-drift bug class). Scoped to
        # inputs.package so a decoupled single-package release (e.g. the workbay
        # name-claim) is not blocked by another package's unrelated drift; each
        # package's own drift is still gated when it is the one dispatched.
        run: python scripts/check_release_version_drift.py --package "${{ inputs.package }}"

      - name: Compute release plan JSON
        run: scripts/release.sh plan --json > release-plan.json

      - name: Validate selected package plan state
        id: selected-package
        env:
          PACKAGE: ${{ inputs.package }}
        # Delegates to the unit-tested gate (scripts/release_publish_gate.py) so
        # the accepted-state set is locked by tests and cannot drift back into an
        # un-testable inline copy. The gate accepts only pending_upload and
        # remote_tag_without_pypi (version absent from PyPI) and writes
        # version=<v> to $GITHUB_OUTPUT.
        run: python scripts/release_publish_gate.py --plan release-plan.json --package "$PACKAGE"

      - name: Upload release plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-plan-${{ inputs.package }}
          path: release-plan.json

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Require published-bytes parity inputs for real publish
        if: ${{ !inputs.dry_run }}
        env:
          EXPECTED_WHEEL_SHA256: ${{ inputs.expected_sha256_wheel }}
          EXPECTED_SDIST_SHA256: ${{ inputs.expected_sha256_sdist }}
          SOURCE_DATE_EPOCH_INPUT: ${{ inputs.source_date_epoch }}
        run: |
          missing=0
          if [ -z "$EXPECTED_WHEEL_SHA256" ]; then
            echo "missing required input: expected_sha256_wheel"
            missing=1
          fi
          if [ -z "$EXPECTED_SDIST_SHA256" ]; then
            echo "missing required input: expected_sha256_sdist"
            missing=1
          fi
          if [ -z "$SOURCE_DATE_EPOCH_INPUT" ]; then
            echo "missing required input: source_date_epoch"
            missing=1
          fi
          exit "$missing"

      - name: Build selected package
        env:
          PACKAGE: ${{ inputs.package }}
          SOURCE_DATE_EPOCH_INPUT: ${{ inputs.source_date_epoch }}
        run: |
          # SOURCE_DATE_EPOCH must only be exported when supplied — a bare
          # dry_run dispatch leaves it "" and hatchling fails on int('').
          if [ -n "$SOURCE_DATE_EPOCH_INPUT" ]; then
            export SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH_INPUT"
          fi
          rm -rf dist
          python -m build --outdir dist "packages/${PACKAGE}"
          python -m twine check dist/*

      - name: Published-bytes parity gate
        # Runs whenever either expected digest is supplied (or on a real
        # publish). Supplying exactly one digest fails the gate explicitly
        # instead of silently skipping it.
        if: ${{ !inputs.dry_run || inputs.expected_sha256_wheel != '' || inputs.expected_sha256_sdist != '' }}
        env:
          EXPECTED_WHEEL_SHA256: ${{ inputs.expected_sha256_wheel }}
          EXPECTED_SDIST_SHA256: ${{ inputs.expected_sha256_sdist }}
        run: |
          python scripts/published_bytes_gate.py \
            --dist-dir dist \
            --expected-sha256-wheel "$EXPECTED_WHEEL_SHA256" \
            --expected-sha256-sdist "$EXPECTED_SDIST_SHA256"

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ inputs.package }}-${{ needs.plan.outputs.package_version }}
          path: dist/

  publish:
    name: Publish via Trusted Publishing
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    needs: [plan, build]
    environment:
      name: pypi
      url: https://pypi.org/project/${{ inputs.package }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dist-${{ inputs.package }}-${{ needs.plan.outputs.package_version }}
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
