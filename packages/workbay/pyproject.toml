[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "workbay"
version = "0.2.0"
description = "WorkBay front door: one command — `workbay install` — to hoist the WorkBay agentic-workflow surface into any repo. Pins the published workbay-stack runtime."
readme = "README.md"
# The front door itself floors at 3.11: it carries no member code, and the
# pinned workbay-stack==0.2.0 transitively enforces its own >=3.12 at install,
# so tightening here is unnecessary and would contradict the shell's rationale.
requires-python = ">=3.11"
license = "MIT"
# `workbay` is a CONSUMER of workbay-stack, not a stack member: it pins the
# published stack exact (the runtime) plus a bootstrap floor (the installer it
# delegates to). Never add `workbay` to STACK_MEMBERS — the stray-pin guard
# fails closed.
dependencies = [
    "workbay-stack==0.2.0",
    "workbay-bootstrap>=0.2.0",
]

[project.scripts]
workbay = "workbay.cli:main"

[project.urls]
Homepage = "https://github.com/darce/workbay"
Source = "https://github.com/darce/workbay/tree/main/packages/workbay"
Documentation = "https://github.com/darce/workbay/blob/main/docs/CONSUMER.md"
Changelog = "https://github.com/darce/workbay/blob/main/packages/workbay/CHANGELOG.md"
Issues = "https://github.com/darce/workbay/issues"

# pip and PyPI consumers ignore [tool.uv.sources], so the shipped
# `workbay-stack==0.2.0` pin (and the `workbay-bootstrap>=0.2.0` floor) still
# govern published installs. Inside the uv workspace these steer the local
# build/test (and the workbay test.yml job) to the editable sibling packages
# instead — exercised by the pre-publish proxy, never by the post-publish
# `uvx workbay install` Exit gate. Workspace members must use `{ workspace =
# true }`, not a path.
[tool.uv.sources]
workbay-stack = { workspace = true }
workbay-bootstrap = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

# Scrub-at-build shape mirrors workbay-stack: only-include the remapped IMPORT
# name (not src/<pkg>) so hatchling ships nothing raw and the hook's scrubbed
# force-include is the sole copy. Rebuild-safe via the sdist top-level <pkg>.
[tool.hatch.build.targets.wheel]
only-include = ["workbay"]

[tool.hatch.build.targets.sdist]
only-include = ["workbay", "hatch_build.py", "_scrub_core.py"]
exclude = ["**/__pycache__", "**/*.pyc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
