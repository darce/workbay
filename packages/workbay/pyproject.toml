[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "workbay"
version = "0.3.6"
description = "WorkBay front door: one command — `workbay install` — to hoist the WorkBay agentic-workflow surface into any repo. The runtime version anchor: pins every published WorkBay runtime member."
readme = "README.md"
# The front door carries no member code of its own; the exact member pins below
# transitively enforce the strictest member floor (mcp-workbay-handoff >=3.12)
# at install, so the 3.11 declared here only governs `workbay`'s own wheel.
requires-python = ">=3.11"
license = "MIT"
# `workbay` IS the runtime version anchor (workbay-stack was retired): its
# `dependencies` carry the exact `==` member pins, GENERATED by
# `scripts/stack_pins.py` (`make stack-pins-sync`) and gated by
# `make stack-pins-check`. Never hand-edit the block between the sentinels.
# `workbay` is the anchor, not a member — never add it to STACK_MEMBERS.
dependencies = [
    # >>> STACK PINS (generated by scripts/stack_pins.py; make stack-pins-sync) >>>
    "workbay-protocol==0.2.0",
    "mcp-workbay-handoff==0.2.0",
    "mcp-workbay-orchestrator==0.2.0",
    "workbay-bootstrap==0.3.5",
    "workbay-system==0.3.3",
    # <<< STACK PINS <<<
]

[project.scripts]
workbay = "workbay.cli:main"

[project.urls]
Homepage = "https://github.com/darce/workbay"
Source = "https://github.com/darce/workbay/tree/main/packages/workbay"
Documentation = "https://github.com/darce/workbay/blob/main/docs/CONSUMER.md"
Changelog = "https://github.com/darce/workbay/blob/main/packages/workbay/CHANGELOG.md"
Issues = "https://github.com/darce/workbay/issues"

# pip and PyPI consumers ignore [tool.uv.sources], so the shipped exact member
# pins above govern published installs. Inside the uv workspace these steer the
# local build/test (and the workbay test.yml job) to the editable sibling
# packages instead — exercised by the pre-publish proxy, never by the
# post-publish `uvx workbay install` Exit gate. Workspace members must use
# `{ workspace = true }`, not a path.
[tool.uv.sources]
workbay-protocol = { workspace = true }
mcp-workbay-handoff = { workspace = true }
mcp-workbay-orchestrator = { workspace = true }
workbay-bootstrap = { workspace = true }
workbay-system = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

# Scrub-at-build shape: only-include the remapped IMPORT name (not src/<pkg>) so
# hatchling ships nothing raw and the hook's scrubbed force-include is the sole
# copy. Rebuild-safe via the sdist top-level <pkg>.
[tool.hatch.build.targets.wheel]
only-include = ["workbay"]

[tool.hatch.build.targets.sdist]
only-include = ["workbay", "hatch_build.py", "_scrub_core.py"]
exclude = ["**/__pycache__", "**/*.pyc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
