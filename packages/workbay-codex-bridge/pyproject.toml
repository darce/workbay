[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "workbay-codex-bridge"
version = "0.2.0"
description = "Optional Codex app-server bridge for daemon subagent execution."
readme = "README.md"
requires-python = ">=3.11"

[project.urls]
Homepage = "https://github.com/darce/workbay"
Source = "https://github.com/darce/workbay/tree/main/packages/workbay-codex-bridge"
Documentation = "https://github.com/darce/workbay/blob/main/docs/CONSUMER.md"
Changelog = "https://github.com/darce/workbay/blob/main/packages/workbay-codex-bridge/CHANGELOG.md"
Issues = "https://github.com/darce/workbay/issues"

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.11.0,<1.0.0",
    "mypy>=1.13.0,<2.0.0",
]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

# Scrub-at-build shape: only-include the remapped IMPORT name (not src/<mod>.py) so
# hatchling ships nothing raw and the hook's scrubbed force-include is the sole copy
# (REVB-01). Rebuild-safe: the hook resolves the bare module name to the sdist's
# top-level workbay_codex_bridge.py when src/ is absent.
[tool.hatch.build.targets.wheel]
only-include = ["workbay_codex_bridge.py"]

[tool.hatch.build.targets.sdist]
only-include = ["workbay_codex_bridge.py", "hatch_build.py", "_scrub_core.py"]
exclude = ["**/__pycache__", "**/*.pyc"]

[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    "build",
    "src/*.egg-info",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402", "F401", "F811"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
files = ["src"]
exclude = ["build/"]
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
no_implicit_optional = true
disallow_untyped_defs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = [
    ".pytest_cache",
    "build",
    "src/*.egg-info",
]
