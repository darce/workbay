  # SessionStart and UserPromptSubmit hooks have no tool-name matcher in the
  # Claude Code schema; the matcher field is omitted intentionally.
  session_start:
  # Fresh-clone self-heal: regenerates gitignored plugin trees + Copilot prompts
  # before slash commands load. Script body ships once under scripts/hooks/
  # (shared provenance surface, already fenced) — not under .claude/hooks —
  # so install materializes it without a harness-specific fence entry [REF-15].
  #
  # Claude-only registration by design. The script shells `make plugins-build` /
  # `make generate-agent-workflows` — monorepo self-host dev targets that do not
  # exist in a consumer repo (consumers install prebuilt surfaces from the
  # package). It also only fires on Claude Code SessionStart; VS Code Copilot and
  # Codex have no equivalent trigger. Declaring vscode_command/cursor_command
  # would emit the script into cross-harness guard surfaces (terminal-guard.json,
  # cursor hooks.json) where install hook-coherence would fail consumers that
  # never materialize SessionStart wiring. Omitting them keeps registration in
  # `.claude/settings.json` only; the script itself is delivered via the shared
  # surface for all consumers.
    - id: ensure-agent-surfaces
      status_message: Ensuring agent surfaces
      timeout: 60
      claude_command: bash "$CLAUDE_PROJECT_DIR/scripts/hooks/ensure-agent-surfaces.sh"
      vscode_enabled: false
      cursor_enabled: false
      codex_enabled: false
      unsupported_reason: "Claude SessionStart only; Codex (and VS Code/Cursor) have no SessionStart hook surface, and the script runs monorepo-only make targets."
    - id: advise-worktree-cd
      status_message: Advising worktree cd
      timeout: 5
      claude_command: python3 "$CLAUDE_PROJECT_DIR/scripts/hooks/advise-worktree-cd.py"
      vscode_command: python3 scripts/hooks/advise-worktree-cd.py
      codex_command: python3 scripts/hooks/advise-worktree-cd.py
      cursor_command: python3 scripts/hooks/advise-worktree-cd.py
    # internal: surfaces dangling hook references at session start
    # (warn-only via additionalContext, always exit 0; the fail-open
    # _run_guard.py wrapper is the runtime net once configs carry the
    # wrapper prefix).
    - id: coherence-self-check
      status_message: Checking hook-surface coherence
      timeout: 10
      claude_command: python3 "$CLAUDE_PROJECT_DIR/scripts/hooks/coherence-self-check.py"
      vscode_command: python3 scripts/hooks/coherence-self-check.py
      codex_command: python3 scripts/hooks/coherence-self-check.py
      cursor_command: python3 scripts/hooks/coherence-self-check.py
