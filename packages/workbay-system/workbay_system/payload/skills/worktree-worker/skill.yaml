name: worktree-worker
description: Execute a delegated slice inside a worktree lane. Query scope from MCP,
  stay in owned paths, run lane-local tests, hand back merge-ready reports.
mode: execution
context_budget: 180
makefile_target: lane-run
mcp_tools:
- get_lane_activity
- lane_communication
- worker_reports
- review_findings
- record_event
tdd_gate: true
scope: harness
generator:
  claude_overrides:
    disable-model-invocation: false
