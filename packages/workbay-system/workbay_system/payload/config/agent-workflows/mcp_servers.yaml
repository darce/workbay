# packages/workbay-system/config/agent-workflows/mcp_servers.yaml
#
# Canonical MCP server registration manifest. Single source for every MCP
# registration surface: the plugin distribution generator reads it directly,
# and the bootstrap-side root-surface pins in
# packages/workbay-bootstrap/src/workbay_bootstrap/install.py are
# generated from it.
#
# Git-only delivery (internal S2): launch through the stdlib
# ``mcp_launch.py`` shim, which execs the git-installed / workspace ``.venv``
# console script — never per-session ``uvx`` PyPI resolution.

version: 2
plugin_version: "0.3.0"
registration:
  claude: root
  codex: root
  cursor: root
  vscode: root
  grok: root
mcp_servers:
  - name: workbay-handoff-mcp
    command: python3
    args:
      - scripts/hooks/mcp_launch.py
      - workbay-handoff-mcp
    harnesses: [claude, codex, cursor, grok, vscode]
  - name: workbay-orchestrator-mcp
    command: python3
    args:
      - scripts/hooks/mcp_launch.py
      - workbay-orchestrator-mcp
    harnesses: [claude, codex, cursor, grok, vscode]

# Opt-in managed servers. Kept under a DISTINCT top-level key (not `mcp_servers`)
# so any consumer that predates opt-in support — an older `render()`, or the
# harness-surface generator that iterates `mcp_servers` — ignores this block
# entirely and materialises a valid (thinner) surface with these servers
# EXCLUDED. That is the forward-compatible default (DDIA §4: old code ignores
# unknown fields; the safe default must be "absent", never "always-on").
# Materialised only when the operator passes `opt_in_flag`. The concrete binary
# identity and its launch-time capability probe live ONLY in the shim's SERVERS
# registry (scripts/hooks/mcp_launch.py) — never here — so no vendor/binary name
# leaks into the canonical manifest (correctness-checklist §6).
optional_mcp_servers:
  - name: codebase-graph-mcp
    command: python3
    args:
      - scripts/hooks/mcp_launch.py
      - codebase-graph-mcp
    harnesses: [claude, codex, cursor, grok, vscode]
    opt_in_flag: --with-codebase-graph
