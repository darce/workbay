[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "workbay-stack"
version = "0.3.4"
description = "WorkBay meta-package: one version anchor that pins the full published WorkBay runtime stack (payload, protocol, bootstrap, MCP servers)."
readme = "README.md"
# Floor must match the strictest member pin (mcp-workbay-handoff >=3.12);
# a looser floor makes `uv sync` unresolvable and aborts `make task-start`.
requires-python = ">=3.12"
license = "MIT"
# Exact pins are GENERATED — never hand-edit. `make stack-pins-sync` rewrites
# the block from sibling pyproject versions; `make stack-pins-check` gates
# check-all and release on the pins matching.
dependencies = [
    # >>> STACK PINS (generated by scripts/stack_pins.py; make stack-pins-sync) >>>
    "workbay-protocol==0.3.0",
    "mcp-workbay-handoff==0.13.3",
    "mcp-workbay-orchestrator==0.8.0",
    "workbay-bootstrap==0.11.0",
    "workbay-system==0.5.0",
    # <<< STACK PINS <<<
]

[project.urls]
Homepage = "https://github.com/darce/workbay"
Source = "https://github.com/darce/workbay/tree/main/packages/workbay-stack"
Changelog = "https://github.com/darce/workbay/blob/main/packages/workbay-stack/CHANGELOG.md"
Issues = "https://github.com/darce/workbay/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

# Scrub-at-build shape: only-include the remapped IMPORT name (not src/<pkg>) so
# hatchling ships nothing raw and the hook's scrubbed force-include is the sole
# copy (REVB-01). Rebuild-safe: the hook falls back to the sdist top-level <pkg>.
[tool.hatch.build.targets.wheel]
only-include = ["workbay_stack"]

[tool.hatch.build.targets.sdist]
only-include = ["workbay_stack", "hatch_build.py", "_scrub_core.py"]
exclude = ["**/__pycache__", "**/*.pyc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
